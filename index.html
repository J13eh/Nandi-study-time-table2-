<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>One Year Countdown</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,Helvetica,sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    color:#fff;
    overflow:hidden;
}

.container{
    width:95%;
    max-width:900px;
    text-align:center;
    padding:40px;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(10px);
    border-radius:20px;
    box-shadow:0 15px 40px rgba(0,0,0,.35);
}

h1{
    font-size:3rem;
    margin-bottom:15px;
}

.subtitle{
    opacity:.8;
    margin-bottom:35px;
    font-size:1.1rem;
}

.timer{
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:20px;
}

.box{
    width:150px;
    height:150px;
    background:rgba(255,255,255,.1);
    border-radius:15px;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    transition:.3s;
}

.box:hover{
    transform:translateY(-8px);
    background:rgba(255,255,255,.18);
}

.value{
    font-size:3rem;
    font-weight:bold;
}

.label{
    margin-top:10px;
    font-size:1rem;
    letter-spacing:2px;
    text-transform:uppercase;
    opacity:.85;
}

.finish{
    font-size:2.5rem;
    color:#00ff99;
    display:none;
}

@media(max-width:700px){
    .box{
        width:120px;
        height:120px;
    }

    .value{
        font-size:2.3rem;
    }

    h1{
        font-size:2.2rem;
    }
}
</style>
</head>

<body>

<div class="container">

    <h1>1 Year Countdown</h1>
    <p class="subtitle">Time remaining</p>

    <div class="timer" id="timer">

        <div class="box">
            <div class="value" id="days">0</div>
            <div class="label">Days</div>
        </div>

        <div class="box">
            <div class="value" id="hours">0</div>
            <div class="label">Hours</div>
        </div>

        <div class="box">
            <div class="value" id="minutes">0</div>
            <div class="label">Minutes</div>
        </div>

        <div class="box">
            <div class="value" id="seconds">0</div>
            <div class="label">Seconds</div>
        </div>

    </div>

    <div class="finish" id="finish">
        🎉 One Year Has Passed! 🎉
    </div>

</div>

<script>

// Save the target date the first time the page is opened.
let target = localStorage.getItem("oneYearCountdown");

if(!target){
    let future = new Date();
    future.setFullYear(future.getFullYear() + 1);
    target = future.getTime();
    localStorage.setItem("oneYearCountdown", target);
}

target = Number(target);

function updateCountdown(){

    const now = Date.now();
    const diff = target - now;

    if(diff <= 0){

        document.getElementById("timer").style.display="none";
        document.getElementById("finish").style.display="block";
        clearInterval(interval);

        return;
    }

    const days = Math.floor(diff / (1000*60*60*24));
    const hours = Math.floor((diff%(1000*60*60*24))/(1000*60*60));
    const minutes = Math.floor((diff%(1000*60*60))/(1000*60));
    const seconds = Math.floor((diff%(1000*60))/1000);

    document.getElementById("days").textContent = days;
    document.getElementById("hours").textContent = String(hours).padStart(2,"0");
    document.getElementById("minutes").textContent = String(minutes).padStart(2,"0");
    document.getElementById("seconds").textContent = String(seconds).padStart(2,"0");
}

updateCountdown();

const interval = setInterval(updateCountdown,1000);

</script>

</body>
</html>
